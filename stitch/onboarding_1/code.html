<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
        }
        .kinetic-gradient {
            background: linear-gradient(135deg, #6d5a00 0%, #fdd400 100%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col overflow-hidden">
<!-- Onboarding suppression logic: No TopAppBar or BottomNavBar for Transactional/Onboarding focus -->
<main class="relative flex-grow flex flex-col items-center justify-center">
<!-- Visual Anchor: Kinetic Illustration Section -->
<div class="relative w-full h-[530px] overflow-hidden">
<!-- Background Layer: Abstract Motion -->
<div class="absolute inset-0 bg-surface-container-low opacity-50 flex items-center justify-center">
<div class="w-[150%] h-[150%] rotate-12 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary-container/20 via-transparent to-transparent"></div>
</div>
<!-- Foreground: Sleek Taxi Illustration -->
<div class="relative z-10 w-full h-full flex flex-col items-center justify-center px-8">
<div class="w-full max-w-md aspect-[16/10] rounded-xl overflow-hidden shadow-2xl scale-110 md:scale-100">
<img class="w-full h-full object-cover" data-alt="A sleek modern electric taxi with golden highlights driving on a stylized city street with blurred motion lights at dusk" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC6DJSa3lvq9Q0Ke-rs_rF-P-CaFyOYnEOZ8K8AkzjUuelW_JkHlhCRTvYyUJ9CinnoISYzT-K8FtA_4mkmCzkQxhYDB7tz5LjUIXu6QWpdevsT43UDgBkvuyhXsmYDlNgyosUqHEE7m56FuKD3cCUMZS9jh-x1HiQA1sCsYdw98G8AELVGD00LHfQTjDPaTNiASHO7Z4q1MD1FMapNEzmUDy7CFt3yUp2vDdU7ThXtRdYLqGPlhHopsDafzCN64QRqmkwyGQ69gY_G"/>
</div>
<!-- Floating Info Badge: Kinetic Detail -->
<div class="absolute top-1/4 right-[10%] glass-card p-4 rounded-lg shadow-lg flex items-center gap-3 border border-white/20">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container" data-icon="bolt">bolt</span>
</div>
<div>
<p class="text-[10px] font-label uppercase tracking-widest text-secondary">Response Time</p>
<p class="font-headline font-bold text-on-surface">&lt; 3 MINS</p>
</div>
</div>
</div>
</div>
<!-- Content Canvas: The Trip Sheet Style Onboarding -->
<div class="glass-card w-full max-w-2xl mx-auto flex-grow -mt-20 rounded-t-xl p-8 md:p-12 shadow-[0_-12px_48px_rgba(0,0,0,0.08)] flex flex-col items-center text-center z-20">
<!-- Headline Cluster -->
<div class="mb-10 space-y-3">
<span class="inline-block py-1 px-3 bg-secondary-container rounded-full text-[10px] font-label font-bold uppercase tracking-widest text-on-secondary-container">
                    Kinetic Concierge
                </span>
<h1 class="text-4xl md:text-5xl font-headline font-extrabold tracking-tight text-on-surface leading-tight">
                    Fast &amp; Reliable
                </h1>
<p class="text-secondary max-w-sm mx-auto text-lg leading-relaxed">
                    Experience the next generation of urban mobility with precision-timed arrivals and premium comfort.
                </p>
</div>
<!-- Slide Indicators -->
<div class="flex gap-2 mb-12">
<div class="w-8 h-2 rounded-full bg-primary shadow-sm shadow-primary/20"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
<div class="w-2 h-2 rounded-full bg-surface-variant"></div>
</div>
<!-- Action Area -->
<div class="w-full max-w-xs space-y-4">
<button class="kinetic-gradient w-full py-5 rounded-full text-white font-headline font-bold text-lg shadow-xl shadow-primary/30 flex items-center justify-center gap-3 active:scale-95 transition-transform duration-200">
                    Next
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<button class="w-full py-4 text-secondary font-label font-medium hover:text-on-surface transition-colors">
                    Skip
                </button>
</div>
</div>
</main>
<!-- Contextual Details: Editorial Asymmetry -->
<div class="hidden lg:block fixed bottom-12 left-12 max-w-xs opacity-40">
<p class="font-headline italic font-black text-6xl text-surface-variant uppercase pointer-events-none select-none">
            Reliability
        </p>
</div>
<div class="hidden lg:block fixed top-32 right-12 max-w-xs opacity-20">
<p class="font-headline italic font-black text-6xl text-surface-variant uppercase pointer-events-none select-none">
            Kinetic
        </p>
</div>
</body></html>
