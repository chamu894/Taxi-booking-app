<div class="inline-block px-4 py-1 bg-primary-container text-on-primary-container text-[10px] font-bold uppercase tracking-widest rounded-full mb-4">

            </div>
<h1 class="text-[2.5rem] font-extrabold leading-tight tracking-tight mb-2 text-on-surface">How was your ride?</h1>
<p class="text-secondary text-sm">Your feedback helps us maintain Kinetic standards for everyone.</p>
</header>
<!-- Driver Profile Card (Glassmorphism Tier 2) -->
<div class="bg-surface-container-lowest/85 backdrop-blur-xl p-6 rounded-xl shadow-[0_12px_32px_rgba(47,46,46,0.06)] mb-8 flex items-center gap-6">
<div class="relative">
<div class="w-20 h-20 rounded-full overflow-hidden border-4 border-primary-container">
<img alt="Driver" class="w-full h-full object-cover" data-alt="Close up portrait of a smiling professional driver wearing a clean uniform in front of a sleek modern car" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB44YeOpEI1ENQYkuRRV7v-YcCAJLMegm3bh-n0AixoMQ6_tLxX6LBsk9WwrA6U-2-SwiFx6AlNgDS0Jg1HQqMx-jA3UF4FUH8SRGOCv_IE2XgYRWl8JRGAqlEoYNiZL8QAp6HgfeUSvVWflNBYGQwTiULPqDlIE5IvmBCPdWpl-1YIMSpEe3ovQtkEyuOEuP-3hSLuNzs0gxm6IyM_L1p62sKRuwYoNiLv32b25DIT4ztL0ko4FoV8zbu1uDBWxyizczBa8D6eaUzE"/>

                </div>
</div>
<div>
<h2 class="text-xl font-bold text-on-surface mb-0.5">Alex Driver</h2>
<div class="flex items-center gap-2 text-stone-500 text-sm">
<span class="material-symbols-outlined text-yellow-600 text-lg" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-bold text-on-surface">4.98</span>
<span>•</span>
<span>Kinetic Prime</span>
</div>
</div>
</div>
<!-- Star Rating Scale -->
<section class="mb-10">
<div class="flex justify-center gap-3">
<!-- Stars rendered as large interactive elements -->
<button class="text-primary hover:scale-110 transition-transform duration-200">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button class="text-primary hover:scale-110 transition-transform duration-200">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button class="text-primary hover:scale-110 transition-transform duration-200">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button class="text-primary hover:scale-110 transition-transform duration-200">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<button class="text-surface-variant hover:scale-110 transition-transform duration-200">

</button>

<div class="text-center mt-4 text-xs font-bold uppercase tracking-widest text-primary">Very Good</div>

<button class="bg-surface-container-high text-on-surface-variant px-5 py-3 rounded-full font-semibold text-sm flex items-center gap-2 hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-lg">bolt</span>
                    Fast
                </button>
<button class="bg-surface-container-high text-on-surface-variant px-5 py-3 rounded-full font-semibold text-sm flex items-center gap-2 hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-lg">sanitizer</span>
                    Clean
                </button>
<button class="bg-surface-container-high text-on-surface-variant px-5 py-3 rounded-full font-semibold text-sm flex items-center gap-2 hover:bg-surface-variant transition-colors">

</div>

<button class="w-full py-3 text-secondary text-sm font-semibold hover:text-on-surface transition-colors">
