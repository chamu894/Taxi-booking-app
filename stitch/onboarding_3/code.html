<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,700;0,800;1,800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#dfdcdc",
                        "outline-variant": "#afacac",
                        "primary-container": "#fdd400",
                        "secondary-fixed": "#e5e2e1",
                        "on-tertiary-fixed": "#3e4900",
                        "inverse-surface": "#0e0e0e",
                        "on-primary": "#fff2ce",
                        "surface-dim": "#d6d4d3",
                        "on-secondary-fixed-variant": "#5c5b5b",
                        "surface-container": "#eae7e7",
                        "surface-container-lowest": "#ffffff",
                        "error": "#b02500",
                        "on-primary-container": "#594a00",
                        "inverse-primary": "#fdd400",
                        "on-secondary": "#f5f2f1",
                        "surface-container-high": "#e5e2e1",
                        "on-error-container": "#520c00",
                        "on-surface": "#2f2e2e",
                        "on-tertiary": "#e6fe75",
                        "error-container": "#f95630",
                        "outline": "#787676",
                        "primary-fixed": "#fdd400",
                        "background": "#f9f6f5",
                        "tertiary-fixed-dim": "#d0e862",
                        "surface-container-highest": "#dfdcdc",
                        "secondary-fixed-dim": "#d6d4d3",
                        "tertiary-container": "#def76e",
                        "on-secondary-fixed": "#403f3f",
                        "on-error": "#ffefec",
                        "secondary-container": "#e5e2e1",
                        "error-dim": "#b92902",
                        "surface": "#f9f6f5",
                        "primary-fixed-dim": "#edc600",
                        "surface-tint": "#6d5a00",
                        "surface-container-low": "#f3f0ef",
                        "secondary": "#5c5b5b",
                        "inverse-on-surface": "#9e9c9c",
                        "on-primary-fixed-variant": "#645300",
                        "secondary-dim": "#504f4f",
                        "on-background": "#2f2e2e",
                        "on-surface-variant": "#5c5b5b",
                        "tertiary-fixed": "#def76e",
                        "surface-bright": "#f9f6f5",
                        "tertiary": "#536200",
                        "tertiary-dim": "#485500",
                        "on-tertiary-fixed-variant": "#586700",
                        "on-tertiary-container": "#4f5d00",
                        "primary": "#6d5a00",
                        "on-primary-fixed": "#433700",
                        "on-secondary-container": "#525151",
                        "primary-dim": "#5f4e00"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col overflow-x-hidden">
<!-- Top Navigation Suppression: Not rendered for Onboarding (Linear Flow) -->
<main class="flex-grow flex flex-col relative pt-12 pb-8 px-6 max-w-lg mx-auto w-full">
<!-- Header Branding -->
<div class="flex justify-center mb-12">
<h1 class="text-xl font-black italic text-stone-900 tracking-tight font-headline">Kinetic Concierge</h1>
</div>
<!-- Illustration Section (Bento-style Layering) -->
<div class="relative flex-grow flex items-center justify-center mb-12">
<!-- Background Decorative Shape -->
<div class="absolute w-64 h-64 bg-primary-container/20 rounded-full blur-3xl -z-10 animate-pulse"></div>
<div class="relative w-full aspect-square max-w-[320px]">
<!-- Digital Wallet Card 1 (Asymmetric) -->
<div class="absolute top-4 right-4 w-56 h-36 rounded-lg bg-inverse-surface shadow-2xl p-6 flex flex-col justify-between transform rotate-6 z-10">
<div class="flex justify-between items-start">
<span class="material-symbols-outlined text-primary-container text-3xl">contactless</span>
<div class="w-10 h-8 bg-surface-container-highest/20 rounded-md"></div>
</div>
<div>
<p class="text-white/40 text-[10px] tracking-widest uppercase mb-1 font-label">Balance</p>
<p class="text-white text-xl font-headline font-bold">$1,240.50</p>
</div>
</div>
<!-- Digital Wallet Card 2 (Glassmorphism) -->
<div class="absolute bottom-12 left-4 w-56 h-36 rounded-lg glass-card border border-white/20 shadow-xl p-6 flex flex-col justify-between transform -rotate-3 z-20">
<div class="flex justify-between items-start">
<span class="material-symbols-outlined text-primary text-3xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
<div class="text-primary font-bold italic">Kinetic</div>
</div>
<div class="flex items-end justify-between">
<div>
<p class="text-on-surface/40 text-[10px] tracking-widest uppercase font-label">Card Holder</p>
<p class="text-on-surface font-headline font-bold">ALEX DRIVER</p>
</div>
<div class="flex -space-x-2">
<div class="w-6 h-6 rounded-full bg-primary-container/80"></div>
<div class="w-6 h-6 rounded-full bg-primary-dim/80"></div>
</div>
</div>
</div>
<!-- Floating Success Element -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-30 bg-white rounded-full p-4 shadow-lg flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-emerald-500 flex items-center justify-center text-white">
<span class="material-symbols-outlined text-2xl">check</span>
</div>
<div class="pr-2">
<p class="text-[10px] text-stone-400 uppercase font-label leading-none">Status</p>
<p class="font-bold text-sm">Payment Verified</p>
</div>
</div>
</div>
</div>
<!-- Content Section -->
<div class="text-center space-y-4 mb-12">
<h2 class="text-stone-900 font-headline font-extrabold text-3xl leading-tight tracking-tight">
                Easy <span class="text-primary underline decoration-primary-container decoration-4 underline-offset-4">Payments</span>
</h2>
<p class="text-secondary font-body text-base leading-relaxed px-4">
                Connect your preferred payment method once and enjoy a seamless checkout for every single ride. No cash, no friction.
            </p>
</div>
<!-- Pagination Dots -->
<div class="flex justify-center gap-2 mb-10">
<div class="w-2 h-2 rounded-full bg-stone-300"></div>
<div class="w-2 h-2 rounded-full bg-stone-300"></div>
<div class="w-8 h-2 rounded-full bg-primary"></div>
</div>
<!-- Call to Action -->
<div class="mt-auto">
<button class="w-full py-5 rounded-full bg-gradient-to-br from-primary to-primary-container text-stone-900 font-headline font-extrabold text-lg shadow-[0_12px_32px_rgba(109,90,0,0.15)] hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Get Started
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<button class="w-full mt-4 py-3 text-stone-500 font-label text-sm uppercase tracking-widest hover:text-primary transition-colors">
                Manage Methods
            </button>
</div>
</main>
<!-- Visual Texture Layers -->
<div class="fixed inset-0 pointer-events-none -z-20 overflow-hidden">
<!-- Abstract gradient texture -->
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[40%] bg-primary-container/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[40%] h-[30%] bg-secondary-fixed/30 blur-[100px] rounded-full"></div>
</div>
</body></html>
